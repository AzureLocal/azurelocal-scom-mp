site_name: Azure Local — Health Monitoring
site_url: https://AzureLocal.github.io/azurelocal-scom-mp/
site_description: SCOM Management Pack and Azure Monitor Health Models for Azure Local (HCI) clusters.
site_author: Azure Local

repo_name: AzureLocal/azurelocal-scom-mp
repo_url: https://github.com/AzureLocal/azurelocal-scom-mp
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2026 Azure Local — MIT License

theme:
  name: material
  logo: assets/images/azurelocal-scom-mp-icon.svg
  favicon: assets/images/azurelocal-scom-mp-icon.svg
  language: en
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github
  font:
    text: Inter
    code: JetBrains Mono

plugins:
  - search
  - include-markdown
  - mermaid2
  - git-revision-date-localized:
      type: date
      enable_creation_date: true
      fallback_to_build_date: true
  - minify:
      minify_html: true

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - tables
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:mermaid2.fence_mermaid_custom
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/AzureLocal
      name: AzureLocal on GitHub
    - icon: fontawesome/solid/globe
      link: https://azurelocal.cloud
      name: azurelocal.cloud

nav:
  - Home: index.md
  - Design:
      - Overview: design/index.md
      - Scope & Topology: design/scope-topology.md
      - Health Model: design/health-model.md
      - Signal Catalog: design/signal-catalog.md
      - Customization: design/customization.md
      - Concept Mapping (SCOM ↔ AzMon): design/concept-mapping.md
      - Decisions (ADRs):
          - Index: design/decisions/index.md
          - 0001 — Scope & topology: design/decisions/0001-scope-and-topology.md
          - 0002 — Signal source: design/decisions/0002-signal-source.md
          - 0003 — Health rollup policy: design/decisions/0003-health-rollup-policy.md
          - 0004 — SCOM discovery strategy: design/decisions/0004-scom-discovery-strategy.md
          - 0005 — SCOM class hierarchy: design/decisions/0005-scom-class-hierarchy.md
          - 0006 — Azure Monitor entity model: design/decisions/0006-azmon-entity-model.md
          - 0007 — Naming convention: design/decisions/0007-naming-convention.md
          - 0008 — Customization strategy: design/decisions/0008-customization-strategy.md
          - 0009 — Alert vs health-state separation: design/decisions/0009-alert-vs-health-state.md
          - 0010 — Cloud-side prerequisites contract: design/decisions/0010-cloud-prerequisites-contract.md
          - 0011 — L3 Azure-side scope (Tier A/B): design/decisions/0011-l3-azure-scope-and-connectivity.md
          - 0012 — Azure Monitor Workspace vs LAW: design/decisions/0012-azure-monitor-workspace-vs-law-metrics.md
          - 0013 — Azure Monitor deployment strategy: design/decisions/0013-azmon-deployment-strategy.md
          - ADR template: design/decisions/template.md
  - SCOM MP:
      - Overview: scom-mp/index.md
      - SquaredUp DS (optional): scom-mp/squaredup/index.md
  - Azure Monitor:
      - Overview: azure-monitor/index.md
      - Prerequisites: azure-monitor/prerequisites.md
      - SquaredUp Cloud (optional): azure-monitor/squaredup/index.md
  - Migration (SCOM → AzMon):
      - Overview: comparison/index.md
  - Project:
      - About: project/about.md
      - Roadmap: project/roadmap.md
      - Changelog: project/changelog.md
      - License: project/license.md
