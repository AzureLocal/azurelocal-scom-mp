<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 160" width="640" height="160">
  <defs>
    <linearGradient id="bgBanner" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#003A70;stop-opacity:1" />
      <stop offset="60%" style="stop-color:#0078D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A86D8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgIcon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1A86D8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003A70;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="healthGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#00B294;stop-opacity:0.30" />
      <stop offset="100%" style="stop-color:#0078D4;stop-opacity:0" />
    </radialGradient>
    <filter id="dropshadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#001A3A" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="640" height="160" rx="16" ry="16" fill="url(#bgBanner)"/>

  <!-- Subtle terrain grid -->
  <g opacity="0.06" stroke="white" stroke-width="0.7">
    <line x1="0" y1="40" x2="640" y2="40"/>
    <line x1="0" y1="80" x2="640" y2="80"/>
    <line x1="0" y1="120" x2="640" y2="120"/>
    <line x1="160" y1="0" x2="160" y2="160"/>
    <line x1="320" y1="0" x2="320" y2="160"/>
    <line x1="480" y1="0" x2="480" y2="160"/>
  </g>

  <!-- Icon area background (left panel) -->
  <rect x="16" y="16" width="128" height="128" rx="18" fill="url(#bgIcon)" opacity="0.7"/>

  <!-- MP badge (scaled 0.65, centered at x=80, y=36) -->
  <g transform="translate(80,36)" filter="url(#dropshadow)">
    <polygon points="0,-9 9,-3 7,8 0,5 -7,8 -9,-3"
      fill="#00B294" stroke="#008F76" stroke-width="0.6"/>
    <text x="0" y="2" text-anchor="middle" font-family="Arial, sans-serif" font-weight="bold"
      font-size="5" fill="white">MP</text>
  </g>

  <!-- Monitor frame (scaled 0.65, centered at x=80, y=90) -->
  <g filter="url(#dropshadow)">
    <!-- Bezel -->
    <rect x="48" y="54" width="63" height="48" rx="7" ry="7" fill="white"/>
    <!-- Screen -->
    <rect x="52" y="58" width="55" height="40" rx="4" ry="4" fill="url(#bgIcon)"/>
    <rect x="52" y="58" width="55" height="40" rx="4" ry="4" fill="url(#healthGlow)"/>
    <!-- ECG pulse line -->
    <polyline
      points="56,78 62,78 64,68 67,89 70,68 73,78 79,78 82,73 85,83 88,78 103,78"
      fill="none" stroke="#00B294" stroke-width="1.7"
      stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Stand neck -->
    <rect x="78" y="102" width="5" height="9" rx="1" fill="white" opacity="0.85"/>
    <!-- Stand base -->
    <rect x="68" y="111" width="24" height="5" rx="2" fill="white" opacity="0.85"/>
  </g>

  <!-- Health state dots -->
  <g filter="url(#dropshadow)">
    <circle cx="66" cy="125" r="4" fill="#57A300"/>
    <circle cx="80" cy="125" r="4" fill="#FFB900"/>
    <circle cx="94" cy="125" r="4" fill="#E81123"/>
  </g>

  <!-- Text: project name area -->
  <!-- "AZURE LOCAL" label -->
  <text x="178" y="58"
    font-family="Arial, sans-serif" font-size="13" font-weight="normal"
    letter-spacing="3" fill="#00B294" opacity="0.95">AZURE LOCAL</text>

  <!-- "SCOM MP" heading -->
  <text x="175" y="105"
    font-family="Arial, sans-serif" font-size="50" font-weight="bold"
    fill="white" filter="url(#dropshadow)">SCOM MP</text>

  <!-- Subtitle -->
  <text x="178" y="130"
    font-family="Arial, sans-serif" font-size="13"
    fill="white" opacity="0.65">Health Models &amp; Management Packs</text>
</svg>
